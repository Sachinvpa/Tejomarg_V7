<style id="doc-css">
/* ===========================================================
   STANDARD QUOTATION — white A4 sheet, Tejomarg brand accents
   =========================================================== */
:root{
    --brand:#FF700A;
    --brand-dark:#D85B00;
    --tint:#FFF4EB;
    --tint-border:#F6DCC8;
    --brand-light:#FFE0C2;
    --brand-light-border:#F3C9A2;
    --ink:#1A1A1A;
    --text:#2B2B2B;
    --soft:#6B6560;
    --rule:#E4DCD4;
    --white:#FFFFFF;
    --font:'General Sans','Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box}

html{background:#EFECE8}
body{
    font-family:var(--font);
    background:#EFECE8;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    padding:30px 0;
}

/* A4 sheet */
.page{
    width:210mm;
    height:297mm;
    background:var(--white);
    margin:0 auto 26px;
    padding:14mm 15mm 11mm;
    position:relative;
    display:flex;
    flex-direction:column;
    box-shadow:0 8px 30px rgba(0,0,0,.16);
    overflow:hidden;
}
.page .body{flex:1 1 auto;min-height:0;display:flex;flex-direction:column}
.rfoot{margin-top:auto;display:flex;justify-content:space-between;align-items:center;
    border-top:1px solid var(--rule);padding-top:7px;font-size:7.6pt;color:var(--soft);flex:0 0 auto}

/* letterhead */
.lhead{display:flex;align-items:center;gap:18px}
.lhead .lwm svg{width:148px;height:51px;display:block}
.lhead .lmid{flex:1 1 auto;text-align:right;font-size:8.4pt;color:var(--soft);line-height:1.6}
.lrule{margin-top:10px;height:0;border-top:3px solid var(--brand)}

/* document title — brand word between thin rules, no box */
.qtitle{margin:14px 0 0;text-align:center;text-indent:.3em;
    font-size:13pt;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:var(--brand)}

/* to + meta info row */
table.info{width:100%;border-collapse:separate;border-spacing:0;margin-top:12px}
.info>tbody>tr>td{vertical-align:top;padding:11px 14px}
.info td.toc{width:56%;background:var(--tint);border-left:3px solid var(--brand);border-radius:0 8px 8px 0}
.info>tbody>tr>td+td{padding-left:26px;padding-right:0}
.info .lbl{font-size:7.8pt;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand-dark);margin-bottom:4px}
.info .to-attn{font-size:10.5pt;font-weight:600;color:var(--ink)}
.info .to-name{font-size:10pt;font-weight:400;color:var(--text);margin-top:1px}
.info .to-ad{font-size:9.2pt;line-height:1.55;margin-top:2px}
.info .to-ad strong{color:var(--ink)}
table.kv{width:100%;border-collapse:collapse}
.kv td{padding:4.5px 0;font-size:9.3pt;vertical-align:baseline;border-bottom:1px solid var(--rule)}
.kv tr:last-child td{border-bottom:none}
.kv td.k{width:44%;font-size:8.2pt;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--soft)}
.kv td.v{font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}

/* subject */
.subject{margin-top:12px;font-size:9.8pt;line-height:1.55;color:var(--text)}
.subject .sl{font-weight:700;color:var(--brand-dark)}

/* items table */
table.items{width:100%;border-collapse:collapse;margin-top:10px}
.items th{border:1px solid var(--brand-light-border);background:var(--brand-light);color:var(--ink);font-size:8.2pt;font-weight:700;
    letter-spacing:.06em;text-transform:uppercase;padding:7px 9px;text-align:left;border-bottom:2px solid var(--brand)}
.items td{border:1px solid var(--rule);padding:9px;font-size:9.4pt;vertical-align:top}
.items th.num,.items td.num{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.items td.center{text-align:center}
.iname{font-size:9.9pt;font-weight:700;color:var(--ink);line-height:1.3}
.isub{font-size:8.7pt;color:#54504C;margin-top:4px;line-height:1.5}
.items td.tlabel{text-align:right;font-weight:600;font-size:9.2pt;color:var(--ink)}
.items tr.total td{background:var(--brand-light);border-color:var(--brand-light-border);color:var(--ink);font-weight:700;font-size:10.2pt;border-top:2px solid var(--brand)}
.items tr.words td{background:var(--tint);border-color:var(--tint-border);font-size:9pt;line-height:1.5;padding:8px 10px}
.items tr.words strong{color:var(--brand-dark)}

/* terms */
.terms{margin-top:13px}
.terms h4{font-size:8.6pt;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand-dark);margin-bottom:6px}
.terms ol{padding-left:18px}
.terms li{font-size:8.8pt;line-height:1.55;color:var(--text);margin-bottom:3px}
.terms li::marker{font-weight:600;color:var(--brand-dark)}
.terms strong{color:var(--ink)}

/* place/date + signature */
.sigrow{margin-top:20px;display:flex;justify-content:space-between;align-items:flex-end;gap:30px}
.pd{font-size:9.2pt;color:var(--text);line-height:1.8}
.pd strong{color:var(--ink);font-weight:600}
.sigblk{text-align:center;min-width:220px;position:relative}
.sigblk .for{font-size:9.8pt;font-weight:700;color:var(--ink)}
.sigblk .space{height:56px;display:flex;align-items:flex-end;justify-content:center}
.sigimg{max-height:52px;max-width:160px;display:block}

.sigblk .line{border-top:1.5px solid var(--brand);padding-top:6px}
.sigblk .sname{font-size:9.6pt;font-weight:700;color:var(--ink)}
.sigblk .sdesig{font-size:8.4pt;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--soft);margin-top:2px}

/* toolbar + print */
.toolbar{position:fixed;top:16px;right:16px;z-index:50;display:flex;gap:10px}
.toolbar a,.toolbar button{font-family:var(--font);font-weight:600;font-size:13px;color:#fff;background:var(--brand);
    border:none;border-radius:8px;padding:11px 18px;cursor:pointer;text-decoration:none;display:inline-block;
    box-shadow:0 6px 18px rgba(216,91,0,.35);transition:filter .2s ease}
.toolbar a:hover,.toolbar button:hover{filter:brightness(1.1)}
.toolbar button:focus-visible,.toolbar a:focus-visible{outline:3px solid var(--brand-dark);outline-offset:2px}

@media print{
    html,body{background:#fff;padding:0}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .page{margin:0;box-shadow:none;width:210mm;height:297mm;
        page-break-after:always;break-after:page}
    .page:last-child{page-break-after:auto;break-after:auto}
    .no-print{display:none!important}
}
</style>

<!-- ===========================================================
     PORTAL CHROME — editor panel + stage (never printed/downloaded)
     =========================================================== -->
<style>
body.portal{display:flex;height:100vh;overflow:hidden;padding:0;background:#EFECE8}

.panel{width:392px;flex:0 0 392px;background:var(--white);border-right:1px solid #DDDDDB;
    display:flex;flex-direction:column;height:100vh}
.phead{padding:16px 20px 13px;border-bottom:3px solid var(--brand);display:flex;align-items:center;justify-content:space-between;gap:12px}
.phead .wm svg{width:96px;height:33px;display:block}
.phead .ptag{font-size:8pt;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#fff;
    background:var(--brand);border-radius:5px;padding:4px 9px}
.pscroll{flex:1 1 auto;overflow-y:auto;padding:4px 20px 22px}

.fsec{margin-top:18px}
.fsec>h3{font-size:8pt;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);
    border-bottom:1.5px solid var(--brand);padding-bottom:5px;margin-bottom:10px}

.frow{margin-bottom:9px}
.frow label{font-size:7.8pt;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#777;
    display:block;margin-bottom:4px}
.frow input,.frow select,.frow textarea{width:100%;font-family:var(--font);font-size:12.5px;color:var(--ink);
    padding:7px 9px;border:1px solid #D5D5D3;border-radius:6px;background:var(--white);outline:none;
    transition:border-color .15s ease, box-shadow .15s ease}
.frow textarea{resize:vertical;line-height:1.45}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(255,112,10,.18)}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}

.item-card{border:1px solid #D5D5D3;border-radius:8px;padding:10px 11px 4px;margin-bottom:10px;background:#FAFAF9}
.ic-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ic-no{font-size:8pt;font-weight:700;color:#fff;background:var(--brand);padding:2px 8px;border-radius:5px;
    letter-spacing:.08em;text-transform:uppercase}
.ic-del{font-family:var(--font);font-size:11px;font-weight:600;color:var(--soft);background:none;
    border:1px solid #D5D5D3;border-radius:6px;padding:3px 8px;cursor:pointer}
.ic-del:hover{color:#fff;background:#C0392B;border-color:#C0392B}

.btn{font-family:var(--font);font-weight:600;font-size:13px;color:#fff;background:var(--brand);
    border:1.5px solid var(--brand);border-radius:8px;padding:10px 16px;cursor:pointer;transition:filter .2s ease;width:100%}
.btn:hover{filter:brightness(1.1)}
.btn.ghost{color:var(--brand-dark);background:var(--white)}
.btn.ghost:hover{filter:none;background:var(--tint)}
.btn.small{padding:7px 12px;font-size:12px;width:auto}
.btn:focus-visible{outline:3px solid rgba(255,112,10,.4);outline-offset:2px}

.filerow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.filerow input[type="file"]{font-family:var(--font);font-size:11.5px;color:var(--soft);
    padding:6px;border:1px dashed var(--brand-light-border);border-radius:7px;background:var(--tint)}
.filerow input[type="file"]::file-selector-button{font-family:var(--font);font-weight:600;font-size:11.5px;color:#fff;
    background:var(--brand);border:none;border-radius:6px;padding:5px 10px;margin-right:8px;cursor:pointer}
.pfoot{border-top:1px solid #DDDDDB;padding:13px 20px 15px;background:var(--white);display:grid;gap:8px}
.pfoot .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.savedrow{display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:center}
.savedrow select{font-family:var(--font);font-size:12px;padding:8px;border:1px solid #D5D5D3;border-radius:6px;background:#fff;color:var(--ink)}
.overflow-warn{display:none;font-size:11.5px;font-weight:500;line-height:1.4;color:#7A1F12;background:#FDECEA;
    border:1px solid #E8B4AC;border-radius:6px;padding:8px 10px}
.overflow-warn.on{display:block}

.stage{flex:1 1 auto;overflow:auto;padding:34px 30px}

@media print{
    body.portal{display:block;height:auto;overflow:visible;background:#fff}
    .panel{display:none!important}
    .stage{overflow:visible;padding:0}
}
</style>
</head>

<script>
/* =========================== STATE =========================== */
function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function plusDays(isoStr,n){const d=new Date(isoStr+'T00:00:00');d.setDate(d.getDate()+n);return iso(d)}
const TODAY=iso(new Date());

const DEFAULTS={
    subject:'Quotation for conducting the five-day “Workshop on Software Tools & Techniques” for 70 students.',
    number:'TF/QTN/2026-27/001',
    gstin:'—',
    issueDate:TODAY,
    validDate:plusDays(TODAY,30),
    place:'Pune',
    signName:'Kushal P',
    signDesig:'Director',
    signImg:'',
    toName:'KLS Gogte Institute of Technology',
    toAddress:'“Jnana Ganga”, Udyambag,\nBelagavi – 590008, Karnataka, India',
    toAttn:'The Principal',
    items:[{
        name:'Workshop on Software Tools & Techniques',
        desc:'Five-day hands-on training programme — MySQL & RDBMS fundamentals, advanced SQL joins & window functions, ODBC connectivity, Power Query data transformation and Power BI dashboards with DAX — closing with a presented capstone project.',
        qty:70, unit:'students', rate:2750
    }],
    taxLabel:'GST', taxRate:18,
    terms:[
        'This quotation is valid for 30 days from the date of issue.',
        'The fee is quoted per participant; GST @ 18% is applied as shown above.',
        'Training material, practice datasets and participation certificates are included in the fee.',
        'Computer laboratory, projector and internet connectivity to be arranged by the institute.',
        'The workshop schedule will be mutually finalised upon confirmation of this quotation.',
        'Payment by bank transfer in favour of Tejomarg Foundation within 15 days of invoice.'
    ].join('\n'),
    from:{
        name:'Tejomarg Foundation',
        address:'H-1, 2nd Floor, Rajdhani Industrial Complex, MIDC Bhosari, Pune, Maharashtra – 411026',
        phone:'+91-8296367878',
        email:'contact@tejomarg.org',
        web:'www.tejomarg.org'
    }
};

let state=JSON.parse(JSON.stringify(DEFAULTS));

/* =========================== HELPERS =========================== */
const ESC=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const BR=s=>ESC(s).replace(/\n/g,'<br>');
const fmtN=n=>(isFinite(n)?n:0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function fmtDate(isoStr){
    if(!isoStr)return '—';
    const p=isoStr.split('-');
    if(p.length!==3)return ESC(isoStr);
    return parseInt(p[2],10)+' '+(MONTHS[parseInt(p[1],10)-1]||'')+' '+p[0];
}
function getPath(o,p){return p.split('.').reduce((a,k)=>a&&a[k],o)}
function setPath(o,p,v){const ks=p.split('.');const last=ks.pop();const t=ks.reduce((a,k)=>a[k],o);t[last]=v}

/* Indian-system amount in words */
function inWords(num){
    num=Math.round(num*100)/100;
    const rupees=Math.floor(num), paise=Math.round((num-rupees)*100);
    const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
    const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
    const two=n=>n<20?ones[n]:tens[Math.floor(n/10)]+(n%10?'-'+ones[n%10]:'');
    const three=n=>{
        const h=Math.floor(n/100),r=n%100;
        return (h?ones[h]+' Hundred'+(r?' and ':''):'')+(r?two(r):'');
    };
    function indian(n){
        if(n===0)return 'Zero';
        const parts=[];
        const crore=Math.floor(n/1e7);n%=1e7;
        const lakh=Math.floor(n/1e5);n%=1e5;
        const thou=Math.floor(n/1e3);n%=1e3;
        if(crore)parts.push(indian(crore)+' Crore');
        if(lakh)parts.push(three(lakh)+' Lakh');
        if(thou)parts.push(three(thou)+' Thousand');
        if(n)parts.push(three(n));
        return parts.join(' ');
    }
    let s='Rupees '+indian(rupees);
    if(paise)s+=' and Paise '+two(paise);
    return s+' Only';
}

/* =========================== SHEET RENDER =========================== */
function calc(){
    const subtotal=state.items.reduce((a,it)=>a+(parseFloat(it.qty)||0)*(parseFloat(it.rate)||0),0);
    const taxAmt=Math.round(subtotal*(parseFloat(state.taxRate)||0)/100*100)/100;
    return {subtotal,tax:taxAmt,grand:subtotal+taxAmt};
}

function sheetHTML(){
    const t=calc();
    const itemRows=state.items.map((it,i)=>{
        const amt=(parseFloat(it.qty)||0)*(parseFloat(it.rate)||0);
        return '<tr><td class="center">'+(i+1)+'</td>'+
            '<td><div class="iname">'+ESC(it.name)+'</div>'+
            (it.desc?'<div class="isub">'+BR(it.desc)+'</div>':'')+'</td>'+
            '<td class="num">'+ESC(String(it.qty))+(it.unit?' '+ESC(it.unit):'')+'</td>'+
            '<td class="num">'+fmtN(parseFloat(it.rate)||0)+'</td>'+
            '<td class="num">'+fmtN(amt)+'</td></tr>';
    }).join('');
    const termLis=state.terms.split('\n').map(s=>s.trim()).filter(Boolean)
        .map(s=>'<li>'+ESC(s)+'</li>').join('');
    const taxLabel=ESC(state.taxLabel||'GST')+' @ '+ESC(String(parseFloat(state.taxRate)||0))+'%';

    return ''+
'<section class="page" id="sheet">'+
'<div class="body">'+
'<header class="lhead">'+
'<span class="lwm"><svg viewBox="0 0 2540 877" role="img" aria-label="'+ESC(state.from.name)+'"><use href="#tjlogo"/></svg></span>'+
'<div class="lmid">'+BR(state.from.address)+'<br>'+
'Phone: '+ESC(state.from.phone)+' &nbsp;·&nbsp; Email: '+ESC(state.from.email)+' &nbsp;·&nbsp; Web: '+ESC(state.from.web)+'</div>'+
'</header>'+
'<div class="lrule"></div>'+
'<div class="qtitle">Quotation</div>'+
'<table class="info"><tbody><tr>'+
'<td class="toc"><div class="lbl">To</div>'+
(state.toAttn?'<div class="to-attn">'+ESC(state.toAttn)+'</div>':'')+
'<div class="to-name">'+ESC(state.toName)+'</div>'+
'<div class="to-ad">'+BR(state.toAddress)+'</div></td>'+
'<td><table class="kv"><tbody>'+
'<tr><td class="k">Quotation No.</td><td class="v">'+ESC(state.number)+'</td></tr>'+
'<tr><td class="k">Date of Issue</td><td class="v">'+fmtDate(state.issueDate)+'</td></tr>'+
'<tr><td class="k">Valid Until</td><td class="v">'+fmtDate(state.validDate)+'</td></tr>'+
'<tr><td class="k">GSTIN</td><td class="v">'+ESC(state.gstin||'—')+'</td></tr>'+
'</tbody></table></td>'+
'</tr></tbody></table>'+
'<p class="subject"><span class="sl">Sub:</span> '+ESC(state.subject)+'</p>'+
'<table class="items"><thead><tr>'+
'<th style="width:34px">Sl.</th><th>Description</th>'+
'<th class="num" style="width:88px">Qty</th>'+
'<th class="num" style="width:84px">Rate (₹)</th>'+
'<th class="num" style="width:104px">Amount (₹)</th>'+
'</tr></thead><tbody>'+itemRows+
'<tr><td colspan="4" class="tlabel">Subtotal</td><td class="num">'+fmtN(t.subtotal)+'</td></tr>'+
'<tr><td colspan="4" class="tlabel">Add: '+taxLabel+'</td><td class="num">'+fmtN(t.tax)+'</td></tr>'+
'<tr class="total"><td colspan="4" class="tlabel">Grand Total</td><td class="num">₹ '+fmtN(t.grand)+'</td></tr>'+
'<tr class="words"><td colspan="5"><strong>Amount in words:</strong> '+ESC(inWords(t.grand))+' <em>(inclusive of '+taxLabel+')</em></td></tr>'+
'</tbody></table>'+
'<div class="terms"><h4>Terms &amp; Conditions</h4><ol>'+termLis+'</ol></div>'+
'<div class="sigrow">'+
'<div class="pd"><strong>Place:</strong> '+ESC(state.place)+'<br><strong>Date:</strong> '+fmtDate(state.issueDate)+'</div>'+
'<div class="sigblk"><span class="stamp"></span><div class="for">For '+ESC(state.from.name)+'</div>'+
'<div class="space">'+(state.signImg?'<img class="sigimg" src="'+ESC(state.signImg)+'" alt="Signature">':'')+'</div><div class="line">'+
'<div class="sname">'+ESC(state.signName||'')+'</div>'+
'<div class="sdesig">'+ESC(state.signDesig||'')+'</div>'+
'</div></div>'+
'</div>'+
'<div class="rfoot"><span>'+ESC(state.from.name)+' · Quotation '+ESC(state.number)+'</span><span>Page 01 / 01</span></div>'+
'</div>'+
'</section>';
}

function renderSheet(){
    document.getElementById('sheetwrap').innerHTML=sheetHTML();
    requestAnimationFrame(checkOverflow);
}
function checkOverflow(){
    const body=document.querySelector('#sheet .body');
    const warn=document.getElementById('overflow-warn');
    if(!body||!warn)return;
    const last=body.lastElementChild;
    const over=body.scrollHeight>body.clientHeight+2;
    warn.classList.toggle('on',over);
}

/* =========================== FORM =========================== */
function renderItemsForm(){
    const pt=document.getElementById('prog-title');
    if(pt)pt.value=state.items[0]?state.items[0].name:'';
    const wrap=document.getElementById('items-form');
    wrap.innerHTML=state.items.map((it,i)=>''+
        '<div class="item-card">'+
        '<div class="ic-head"><span class="ic-no">Item '+(i+1)+'</span>'+
        (state.items.length>1?'<button type="button" class="ic-del" data-del="'+i+'">✕ remove</button>':'')+
        '</div>'+
        '<div class="frow"><label>Name</label><input data-item="'+i+'.name" value="'+ESC(it.name)+'"></div>'+
        '<div class="frow"><label>Details</label><textarea rows="4" data-item="'+i+'.desc">'+ESC(it.desc)+'</textarea></div>'+
        '<div class="fgrid3">'+
        '<div class="frow"><label>Qty</label><input type="number" min="0" data-item="'+i+'.qty" value="'+ESC(String(it.qty))+'"></div>'+
        '<div class="frow"><label>Unit</label><input data-item="'+i+'.unit" value="'+ESC(it.unit)+'"></div>'+
        '<div class="frow"><label>Rate ₹</label><input type="number" min="0" step="0.01" data-item="'+i+'.rate" value="'+ESC(String(it.rate))+'"></div>'+
        '</div></div>').join('');
}

function syncForm(){
    document.querySelectorAll('[data-bind]').forEach(el=>{
        const v=getPath(state,el.dataset.bind);
        el.value=v==null?'':v;
    });
    renderItemsForm();
}

/* bound scalar fields */
document.querySelectorAll('[data-bind]').forEach(el=>{
    el.addEventListener('input',()=>{
        const v=el.type==='number'?(el.value===''?'':parseFloat(el.value)||0):el.value;
        setPath(state,el.dataset.bind,v);
        renderSheet();
    });
});

/* item fields + remove (delegated) */
const itemsForm=document.getElementById('items-form');
itemsForm.addEventListener('input',e=>{
    const ref=e.target.dataset.item;
    if(!ref)return;
    const dot=ref.indexOf('.');
    const i=parseInt(ref.slice(0,dot),10), key=ref.slice(dot+1);
    let v=e.target.value;
    if(e.target.type==='number')v=v===''?0:parseFloat(v)||0;
    state.items[i][key]=v;
    if(i===0&&key==='name')document.getElementById('prog-title').value=v;
    renderSheet();
});
itemsForm.addEventListener('click',e=>{
    const del=e.target.dataset.del;
    if(del==null)return;
    state.items.splice(parseInt(del,10),1);
    renderItemsForm();renderSheet();
});
document.getElementById('add-item').addEventListener('click',()=>{
    state.items.push({name:'New line item',desc:'',qty:1,unit:'unit',rate:0});
    renderItemsForm();renderSheet();
});

/* programme title — mirrors line item 1's name */
const progTitle=document.getElementById('prog-title');
progTitle.addEventListener('input',()=>{
    if(!state.items.length)state.items.push({name:'',desc:'',qty:1,unit:'students',rate:0});
    state.items[0].name=progTitle.value;
    const it=document.querySelector('input[data-item="0.name"]');
    if(it)it.value=progTitle.value;
    renderSheet();
});

/* digital signature upload */
document.getElementById('sign-file').addEventListener('change',e=>{
    const f=e.target.files[0];
    if(!f)return;
    const r=new FileReader();
    r.onload=()=>{
        const img=new Image();
        img.onload=()=>{
            const s=Math.min(1,600/img.width,300/img.height);
            const c=document.createElement('canvas');
            c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);
            c.getContext('2d').drawImage(img,0,0,c.width,c.height);
            state.signImg=c.toDataURL('image/png');
            renderSheet();
        };
        img.src=r.result;
    };
    r.readAsDataURL(f);
});
document.getElementById('sign-clear').addEventListener('click',()=>{
    state.signImg='';
    document.getElementById('sign-file').value='';
    renderSheet();
});

/* =========================== ACTIONS =========================== */
const KEY='tf-quotation-portal-v2';
const loadDB=()=>{try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(_){return {}}};
const saveDB=db=>localStorage.setItem(KEY,JSON.stringify(db));

function refreshSaved(){
    const sel=document.getElementById('saved-list');
    const names=Object.keys(loadDB()).sort();
    sel.innerHTML='<option value="">Saved quotations…</option>'+
        names.map(n=>'<option value="'+ESC(n)+'">'+ESC(n)+'</option>').join('');
}

document.getElementById('btn-print').addEventListener('click',()=>window.print());

document.getElementById('btn-save').addEventListener('click',()=>{
    const name=prompt('Save quotation as:',state.number);
    if(!name)return;
    const db=loadDB();db[name]=state;saveDB(db);refreshSaved();
    document.getElementById('saved-list').value=name;
});
document.getElementById('btn-load').addEventListener('click',()=>{
    const name=document.getElementById('saved-list').value;
    if(!name)return;
    const db=loadDB();
    if(!db[name])return;
    state=Object.assign(JSON.parse(JSON.stringify(DEFAULTS)),JSON.parse(JSON.stringify(db[name])));
    syncForm();renderSheet();
});
document.getElementById('btn-delete').addEventListener('click',()=>{
    const name=document.getElementById('saved-list').value;
    if(!name)return;
    if(!confirm('Delete saved quotation “'+name+'”?'))return;
    const db=loadDB();delete db[name];saveDB(db);refreshSaved();
});
document.getElementById('btn-reset').addEventListener('click',()=>{
    if(!confirm('Reset all fields to the default Software Tools & Techniques quotation?'))return;
    state=JSON.parse(JSON.stringify(DEFAULTS));
    syncForm();renderSheet();
});

document.getElementById('btn-download').addEventListener('click',()=>{
    const css=document.getElementById('doc-css').textContent;
    const logo=document.getElementById('logo-defs').outerHTML;
    const sheet=document.getElementById('sheetwrap').innerHTML;
    const title='Quotation '+state.number+' — '+(state.items[0]?state.items[0].name:'')+' · '+state.from.name;
    const doc='<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n'+
        '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n'+
        '<title>'+ESC(title)+'</title>\n'+
        '<link rel="preconnect" href="https://api.fontshare.com" crossorigin>\n'+
        '<link href="https://api.fontshare.com/v2/css?f[]=general-sans@300,400,500,600,700&display=swap" rel="stylesheet">\n'+
        '<style>'+css+'</style>\n</head>\n<body>\n'+logo+'\n'+
        '<div class="toolbar no-print"><button type="button" onclick="window.print()">Print / Save as PDF</button></div>\n'+
        sheet+'\n</body>\n</html>';
    const blob=new Blob([doc],{type:'text/html'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=(state.number||'quotation').replace(/[^\w.-]+/g,'-')+'.html';
    document.body.appendChild(a);a.click();a.remove();
});

/* =========================== INIT =========================== */
refreshSaved();
syncForm();
renderSheet();
</script>
</body>
</html>
